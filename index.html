<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>The Library</title>
    </head>
    <body>
        <script src="./src/index.js" type="module"></script>
        <header>
            <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                height="24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                class=""
            >
                <path d="M12 7v14" />
                <path
                    d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"
                />
            </svg>
            <h2>The Library</h2>
            <!--<button>
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-moon-icon lucide-moon"
                >
                    <path
                        d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
                    />
                </svg>

        </header>
        <main>
            <h1>Discover Your Next Great Read</h1>
            <h2>
                Search millions of books, build your own personalized library,
                and never lose track of what to read next.
            </h2>

            <form id="search-form" class="search-form">
                <input
                    type="text"
                    placeholder="Search for books by the author, title, or genre"
                    name="search-query"
                />
                <button type="submit">Search</button>
            </form>

            <section>
                <div id="book-list" class="book-list">
                    <div class="card">Books</div>
                    <div class="card">Books</div>
                    <div class="card">Books</div>
                    <div class="card">Books</div>
                </div>
                <div class="favorites">
                    <div class="info">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24"
                            height="24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="icon"
                        >
                            <path
                                d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"
                            />
                        </svg>
                        <div class="text">
                            <h2>Favorites</h2>
                            <p>
                                <span class="favorites-count">3</span> books
                                saved
                            </p>
                        </div>
                    </div>
                    <div class="favorite">
                        <img src="/favicon.svg" alt="Book" />
                        <div class="data">
                            <h4>Name</h4>
                            <p>By qwerty</p>
                            <p>1945</p>
                        </div>
                        <button onclick="console.log('liked');">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 24 24"
                                height="24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="icon"
                            >
                                <path
                                    d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"
                                />
                            </svg>
                        </button>
                    </div>
                </div>
            </section>
        </main>
        <footer>Made by Yaskel Artyom.</footer>
    </body>
</html>
